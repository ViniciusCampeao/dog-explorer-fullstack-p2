services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  auth-service:
    build: ./auth-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongo:27017/auth-db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      - mongo
      - redis

  resource-service:
    build: ./resource-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongo:27017/resource-db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      - mongo
      - redis

  notification-service:
    build: ./notification-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AUTH_URL: ${VITE_AUTH_URL}
        VITE_API_URL: ${VITE_API_URL}
        VITE_WS_URL: ${VITE_WS_URL}
    restart: unless-stopped
    ports:
      - "80:80"

volumes:
  mongo-data:
