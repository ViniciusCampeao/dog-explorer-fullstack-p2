<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dog Explorer</title>
    <style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #f4f6f8;
  color: #1f2933;
}

button,
input {
  font-family: inherit;
}

button {
  cursor: pointer;
}

.page {
  width: min(1180px, 94%);
  margin: 0 auto;
  padding: 32px 0;
}

.hero {
  background: #fbd2d226;
  color: rgb(0, 0, 0);
  border-radius: 18px;
  padding: 38px;
  margin-bottom: 24px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.hero-user {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.hero h1 {
  margin: 0;
  font-size: 42px;
}

.subtitle {
  max-width: 660px;
  line-height: 1.6;
  color: #000000;
}

.tag {
  margin: 0 0 8px;
  font-size: 13px;
  font-weight: bold;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #000000fd;
}

.layout {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 24px;
  align-items: start;
}

.left-column,
.right-column {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.card,
.result-card,
.gallery-card,
.empty-state,
.status-card,
.error-card {
  background: white;
  border-radius: 16px;
  padding: 22px;
  box-shadow: 0 12px 30px rgba(51, 255, 0, 0.08);
}

.card h2,
.result-card h2,
.gallery-card h2,
.empty-state h2,
.error-card h2 {
  margin: 0 0 10px;
}

.card-description {
  color: #000000;
  line-height: 1.5;
  margin: 0 0 16px;
}

.search-form {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.search-form label {
  font-weight: bold;
}

.search-form input,
.filter-input {
  width: 100%;
  border: 1px solid #cbd5e1;
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 15px;
  outline: none;
}

.search-form input:focus,
.filter-input:focus {
  border-color: #ebbd25;
}

.search-form button,
.secondary-button {
  border: none;
  background: #999999;
  color: rgb(0, 0, 0);
  border-radius: 10px;
  padding: 12px 16px;
  font-weight: bold;
}

.secondary-button {
  background: #a1a1a14a;
}

.field-error {
  color: #b91c1c;
  font-size: 14px;
}

.section-title-row,
.result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
}

.link-button {
  border: none;
  background: transparent;
  color: #000000;
  font-weight: bold;
}

.history-list,
.breed-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.history-list button,
.breed-list button {
  border: 1px solid #dbe2ea;
  background: #f8fafc;
  border-radius: 999px;
  padding: 8px 12px;
}

.history-list button:hover,
.breed-list button:hover {
  background: #e8f0ff;
  border-color: #faff96;
}

.breed-list {
  margin-top: 14px;
  max-height: 260px;
  overflow: auto;
}

.main-dog-image {
  width: 100%;
  height: 390px;
  object-fit: cover;
  border-radius: 16px;
  margin: 18px 0;
  background: #e5e7eb;
}

.info-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.info-grid div {
  background: #f8fafc;
  border-radius: 12px;
  padding: 14px;
}

.info-grid strong,
.info-grid span {
  display: block;
}

.info-grid strong {
  font-size: 13px;
  color: #637083;
  margin-bottom: 4px;
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.gallery-grid img {
  width: 100%;
  height: 170px;
  object-fit: cover;
  border-radius: 12px;
  background: #e5e7eb;
}

.empty-state,
.status-card,
.error-card {
  text-align: center;
  padding: 54px 24px;
}

.empty-state p,
.error-card p,
.status-card p {
  color: #637083;
}

.error-card {
  border: 1px solid #fecaca;
}

.error-card h2 {
  color: #b91c1c;
}

.spinner {
  width: 42px;
  height: 42px;
  border: 4px solid #dbe2ea;
  border-top-color: #2563eb;
  border-radius: 50%;
  margin: 0 auto 16px;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

@media (max-width: 850px) {
  .layout {
    grid-template-columns: 1fr;
  }

  .hero {
    padding: 28px;
  }

  .hero h1 {
    font-size: 34px;
  }

  .info-grid,
  .gallery-grid {
    grid-template-columns: 1fr;
  }

  .main-dog-image {
    height: 300px;
  }
}


.login-wrapper {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-form {
  width: min(400px, 90vw);
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.login-form h1 {
  margin: 0;
  font-size: 32px;
}

.login-subtitle {
  margin: 0;
  color: #637083;
}

.login-form label {
  display: flex;
  flex-direction: column;
  gap: 6px;
  font-weight: bold;
}

.login-form input {
  border: 1px solid #cbd5e1;
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 15px;
  outline: none;
}

.login-form input:focus {
  border-color: #ebbd25;
}

.login-form button {
  border: none;
  background: #999;
  color: #000;
  border-radius: 10px;
  padding: 12px 16px;
  font-weight: bold;
}

.records-section {
  margin-top: 24px;
}

.dog-form {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin: 14px 0;
}

.dog-form-fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.dog-form input {
  width: 100%;
  border: 1px solid #cbd5e1;
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 14px;
  outline: none;
}

.dog-form input:focus {
  border-color: #ebbd25;
}

.dog-form-actions {
  display: flex;
  gap: 8px;
}

.dog-form-actions button {
  border: none;
  background: #999;
  color: #000;
  border-radius: 10px;
  padding: 10px 16px;
  font-weight: bold;
}

.dog-list {
  list-style: none;
  margin: 14px 0 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.dog-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border: 1px solid #dbe2ea;
  border-radius: 12px;
  gap: 12px;
}

.dog-row--editing {
  display: block;
}

.dog-row-info {
  display: flex;
  align-items: center;
  gap: 12px;
}

.dog-row-thumb {
  width: 48px;
  height: 48px;
  object-fit: cover;
  border-radius: 8px;
  background: #e5e7eb;
}

.dog-row-info strong {
  display: block;
}

.dog-row-info span {
  font-size: 13px;
  color: #637083;
}

.dog-row-actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.danger {
  color: #b91c1c !important;
}

    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/components/main.jsx"></script>
  </body>
</html>
